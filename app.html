<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <meta name="google-adsense-account" content="ca-pub-2453913628416113"> 

    <title>Empezar a Crear CV Online GRATIS | Generador Profesional y Rápido</title>

    <meta name="description" content="Genera tu CV profesional online paso a paso de forma rápida y gratuita. ¡Empieza ahora con MiCVGratis y descarga tu currículum en PDF en minutos!">

    <link rel="canonical" href="https://micvgratis.github.io/app.html">

    <link rel="stylesheet" href="style.css?v=1.1" />
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2453913628416113"
      crossorigin="anonymous"></script>
</head>
<body>
    <div style="min-height: 90px; width: 100%;"></div>

    <div class="container">
        <h1>Creador de Currículum Online: ¡Empieza GRATIS!</h1>
        <form id="cv-form">
            <div class="form-group">
                <label for="nombre">Nombre completo:</label>
                <input type="text" id="nombre" name="nombre" required />
            </div>

            <div class="form-group">
                <label for="email">Email:</label>
                <input type="email" id="email" name="email" required />
            </div>

            <div class="form-group">
                <label for="telefono">Teléfono:</label>
                <input type="tel" id="telefono" name="telefono" />
            </div>

            <div class="form-group">
                <label for="ciudad">Ciudad:</label>
                <input type="text" id="ciudad" name="ciudad" />
            </div>

            <div class="form-group">
                <label for="pais">País:</label>
                <input type="text" id="pais" name="pais" />
            </div>

            <div class="form-group">
                <label for="foto">Foto de Perfil (opcional):</label>
                <input type="file" id="foto" name="foto" accept="image/*" />
            </div>

            <div class="form-group">
                <label for="perfil">Perfil profesional:</label>
                <textarea id="perfil" name="perfil" rows="3"></textarea>
            </div>

            <div class="form-group">
                <label for="experiencia">Experiencia laboral:</label>
                <textarea id="experiencia" name="experiencia" rows="4"></textarea>
            </div>

            <div class="form-group">
                <label for="educacion">Educación:</label>
                <textarea id="educacion" name="educacion" rows="3"></textarea>
            </div>

            <div class="form-group">
                <label for="habilidades">Competencias:</label>
                <textarea id="habilidades" name="habilidades" rows="3"></textarea>
            </div>

            <div class="form-group">
                <label for="idiomas">Idiomas:</label>
                <textarea id="idiomas" name="idiomas" rows="2"></textarea>
            </div>

            <div class="form-group">
                <label for="formacionAdicional">Formación Adicional (Opcional):</label>
                <textarea id="formacionAdicional" name="formacionAdicional" rows="3"></textarea>
            </div>

            <div class="form-group">
                <label for="idioma-cv">Idioma de los títulos del CV:</label>
                <select id="idioma-cv" name="idioma-cv" style="width: 100%; padding: 12px; margin-top: 10px; border-radius: 5px; border: 1px solid #ccc;">
                    <option value="es" selected>🇪🇸 Español</option>
                    <option value="en">🇺🇸 Inglés (English)</option>
                    <option value="fr">🇫🇷 Francés (Français)</option>
                    <option value="de">🇩🇪 Alemán (Deutsch)</option>
                    <option value="it">🇮🇹 Italiano (Italiano)</option>
                </select>
            </div>

            <div class="form-group">
                <label for="diseno-cv" style="font-weight: bold; display: block; margin-top: 15px;">Elegir Diseño:</label>
                <select id="diseno-cv" name="diseno-cv" style="width: 100%; padding: 12px; margin-top: 10px; border-radius: 5px; border: 1px solid #ccc;">
                    <option value="clasico">📜 Clásico (Tradicional)</option>
                    <option value="moderno" selected>🎨 Moderno (Recomendado)</option>
                    <option value="minimalista">☁️ Minimalista (Limpio)</option>
                    <option value="harvard">🏛️ Harvard (Recomendado)</option>
                </select>
            </div>
            <div class="botones">
    <button type="submit">Generar Currículum</button>
    <button type="button" id="descargar-pdf" style="display: none;">Descargar como PDF</button>
    <button type="button" onclick="borrarTodoYReiniciar()" class="btn-limpiar">Limpiar y Empezar de Nuevo</button>
</div>
        </form>
        <div id="resultado" class="resultado"></div>
    </div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="script.js"></script>

    <footer>
        <p>&copy; 2026 MiCVGratis</p>
        <div class="footer-links">
            <a href="politica-privacidad.html">Política de Privacidad</a> |
            <a href="terminos-servicio.html">Términos de Servicio</a> |
            <a href="contacto.html">Contacto</a> |
            <a href="index.html">Página Principal</a>
        </div>
    </footer>
    <div id="loading-overlay" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.98); z-index: 9999; flex-direction: column; align-items: center; justify-content: center; text-align: center; font-family: 'Segoe UI', sans-serif;">
    
    <div class="spinner" style="border: 6px solid #f3f3f3; border-top: 6px solid #007BFF; border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite; margin-bottom: 20px;"></div>
    
    <h2 style="color: #333; margin: 0;">Generando tu CV Profesional...</h2>
    <p style="color: #666; margin-top: 10px;">Optimizando estructura para filtros ATS</p>

    <div id="intersticial-ad" style="margin-top: 30px; min-height: 250px; width: 300px; background: #f0f0f0; border: 1px dashed #ccc; display: flex; align-items: center; justify-content: center; position: relative;">
    <span style="position: absolute; top: -20px; font-size: 10px; color: #aaa; text-transform: uppercase;">Publicidad</span>
    
    <ins class="adsbygoogle"
         style="display:inline-block;width:300px;height:250px"
         data-ad-client="ca-pub-2453913628416113"
         data-ad-slot="8742196925"></ins>
    <script>
         (adsbygoogle = window.adsbygoogle || []).push({});
    </script>
</div>

    <p style="margin-top: 30px; font-size: 13px; color: #888;">La descarga comenzará en unos segundos.</p>
</div>

<style>
/* Animación para el círculo de carga */
@keyframes spin {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
}
</style>
</body>
</html>
